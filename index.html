<!DOCTYPE html>
<html>
<head>
<style>
  body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a2669; }
  
  /* The Window showing your Canva site */
  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* 🛡️ THE SHIELDS: These stay on top NO MATTER WHAT page is inside the iframe */
  .shield {
    position: fixed;
    bottom: 0;
    width: 300px; /* Big enough to cover both Canva and Genially logos */
    height: 80px; 
    background: #0a2669; /* Matches your Dark Blue theme */
    z-index: 999;
  }
  .left { left: 0; }
  .right { right: 0; }
</style>
</head>
<body>

  <!-- This iframe starts on your Canva Menu -->
  <iframe src="https://aavl-oceangiants-exhibition.my.canva.site"></iframe>

  <!-- These blocks cover the "Exit" buttons on the free plans -->
  <div class="shield left"></div>
  <div class="shield right"></div>

</body>
</html>
