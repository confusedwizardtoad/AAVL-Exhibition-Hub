<!DOCTYPE html>
<html lang="en-HK">
<head>
<meta charset="UTF-8">
<title>Ocean Giants Master Hub</title>
<style>
  /* Dark Blue theme to match your exhibition */
  body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0a2669; }
  
  /* The "Window" into your Canva/Genially/GitHub sites */
  iframe { width: 100%; height: 100%; border: none; display: block; }

  /* 🛡️ THE SHIELDS: Blocks "Terms", "Privacy", and "Sign Up" logos */
  .shield {
    position: fixed; bottom: 0; width: 350px; height: 85px;
    background: #0a2669; z-index: 999; pointer-events: auto;
  }
  .left { left: 0; }
  .right { right: 0; }

  /* 🏠 EMERGENCY HOME: Optional tiny button if a user gets stuck */
  #reset-btn {
    position: fixed; top: 10px; right: 10px; opacity: 0.3;
    background: white; color: black; padding: 5px; z-index: 1000;
  }
</style>
</head>
<body>
  <!-- Change this to your actual Canva Menu URL -->
  <iframe id="viewport" src="https://aavl-oceangiants-exhibition.my.canva.site"></iframe>

  <div class="shield left"></div>
  <div class="shield right"></div>
  
  <div id="reset-btn" onclick="location.reload()">REFRESH</div>
</body>
</html>
